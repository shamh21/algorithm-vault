<div class="intro-loader" data-intro-loader data-component="AlgVaultLaunchAnimation" role="status" aria-live="polite" aria-hidden="false" aria-busy="true">
  <div class="intro-loader__ambient" aria-hidden="true"></div>
  <div class="intro-loader__glow" aria-hidden="true"></div>
  <section class="intro-loader__panel" aria-label="AlgVault startup">
    <div class="intro-loader__mark-wrap" aria-hidden="true">
      <span class="intro-loader__ring"></span>
      <span class="intro-loader__ring intro-loader__ring--secondary"></span>
      <span class="intro-loader__vault">
        <img class="intro-loader__mascot" src="/icons/algvault-mascot-192.png" alt="" width="192" height="192" decoding="async">
      </span>
    </div>
    <div class="intro-loader__copy">
      <span class="intro-loader__eyebrow">AlgVault</span>
      <strong data-intro-loader-title>Opening your vault</strong>
      <small data-intro-loader-detail>Preparing a secure session.</small>
    </div>
    <div class="intro-loader__bar" aria-hidden="true"><span></span></div>
    <div class="intro-loader__ticks" aria-hidden="true"><span></span><span></span><span></span></div>
    <button class="intro-loader__retry" type="button" data-intro-loader-retry hidden>Retry</button>
  </section>
</div>
