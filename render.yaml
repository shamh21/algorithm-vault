services:
  - type: worker
    name: algorithm-vault-worker
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: python -m pip install --upgrade pip wheel setuptools && python -m pip install -r requirements.txt
    startCommand: python -m app.workers.runner
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: APP_ENV
        value: production
      - key: DEPLOYMENT_TARGET
        value: vercel
      - key: FLASK_APP
        value: wsgi:app
      - key: WORKER_MODE
        value: worker
      - key: ENABLE_IN_PROCESS_WORKERS
        value: "false"
      - key: WORKER_PROCESS_CONFIGURED
        value: "true"
      - key: SCHEMA_BOOTSTRAP_ENABLED
        value: "false"
      - key: ENABLE_LIVE_TRADING
        value: "true"
      - key: APP_MODE
        value: live
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_APP_ORIGIN
        sync: false
      - key: PUBLIC_API_ORIGIN
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
      - key: TOTP_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SIGNUP_INVITE_CODE
        sync: false
      - key: HL_ACCOUNT_ADDRESS
        sync: false
      - key: HL_SECRET_KEY
        sync: false
