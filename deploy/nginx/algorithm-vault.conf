# Nginx reverse proxy for Algorithm Vault.
#
# Replace /opt/algorithm-vault/current with the deployed release path.
# Terminate TLS here or through your platform load balancer.
# Gunicorn should stay bound to a private upstream such as 127.0.0.1:8000.

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

upstream algorithm_vault_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.algvault.com;

    client_max_body_size 2m;

    # Optional ACME HTTP-01 challenge path for certbot or another ACME client.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.algvault.com;

    ssl_certificate /etc/letsencrypt/live/app.algvault.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.algvault.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:AlgorithmVaultSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 2m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /healthz {
        proxy_pass http://algorithm_vault_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location = /readyz {
        proxy_pass http://algorithm_vault_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location /static/ {
        alias /opt/algorithm-vault/current/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /icons/ {
        alias /opt/algorithm-vault/current/static/icons/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /static/js/sw.js {
        alias /opt/algorithm-vault/current/static/js/sw.js;
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    location = /manifest.json {
        alias /opt/algorithm-vault/current/static/manifest.json;
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    location = /static/manifest.webmanifest {
        alias /opt/algorithm-vault/current/static/manifest.webmanifest;
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }

    location ~ ^/admin/api/.*/stream$ {
        proxy_pass http://algorithm_vault_app;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location / {
        proxy_pass http://algorithm_vault_app;
        proxy_http_version 1.1;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
