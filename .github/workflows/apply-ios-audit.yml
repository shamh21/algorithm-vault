name: Apply AlgVault iOS audit

on:
  push:
    branches: [agent/algvault-ios-audit]
    paths:
      - scripts/apply_ios_audit.py
      - .github/workflows/apply-ios-audit.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/algvault-ios-audit
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply audited production changes
        run: python scripts/apply_ios_audit.py
      - name: Verify generated Python and JSON contracts
        run: |
          python -m compileall app tests/test_mobile_pwa_audit.py
          python -m json.tool static/manifest.json >/dev/null
      - name: Commit audited changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix AlgVault iOS PWA shell, claims, and cache lifecycle"
          git push origin HEAD:agent/algvault-ios-audit
