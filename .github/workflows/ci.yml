name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      SKIP_SCHEMA_BOOTSTRAP: "1"
      DATABASE_URL: sqlite:////tmp/algvault-ci.db
      PUBLIC_APP_ORIGIN: https://app.algvault.com
      PUBLIC_API_ORIGIN: https://app.algvault.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Ruff lint
        run: >
          ruff check
          app/settings_validation.py
          app/services/audit_events.py
          app/services/failures.py
          app/services/response_envelope.py
          app/services/vault_cycle_orchestrator.py
          app/services/worker_lease.py
          app/services/model_registry.py
          app/workers
          tests/test_audit_events.py
          tests/test_production_hardening_migrations.py
          tests/test_vault_cycle_engine.py
          tests/test_worker_and_runtime_hardening.py
      - name: Ruff format check
        run: >
          ruff format --check
          app/settings_validation.py
          app/services/audit_events.py
          app/services/failures.py
          app/services/response_envelope.py
          app/services/vault_cycle_orchestrator.py
          app/services/worker_lease.py
          app/services/model_registry.py
          app/workers
          tests/test_audit_events.py
          tests/test_production_hardening_migrations.py
          tests/test_vault_cycle_engine.py
          tests/test_worker_and_runtime_hardening.py
      - name: Targeted typecheck
        run: mypy
      - name: Migration upgrade
        run: python -m flask --app wsgi:app db upgrade
      - name: Tests with coverage
        env:
          SKIP_SCHEMA_BOOTSTRAP: ""
          DATABASE_URL: sqlite://
        run: coverage run -m pytest && coverage report
